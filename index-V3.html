<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日立 SJ-P1 AI 故障診斷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surf:#161921;--surf2:#1e2230;--surf3:#252a3a;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);--txt:#dde2ee;--muted:#7a849a;--accent:#5b9cf6;--accent-dim:rgba(91,156,246,0.1);--danger:#f47a7a;--danger-dim:rgba(244,122,122,0.1);--warn:#f5a742;--warn-dim:rgba(245,167,66,0.1);--ok:#52c77a;--ok-dim:rgba(82,199,122,0.1);--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;font-size:14px}
/* Header */
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.hdr-logo{width:30px;height:30px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr-info{flex:1}.hdr-title{font-size:14px;font-weight:500}.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ok);background:var(--ok-dim);border:1px solid rgba(82,199,122,0.2);padding:3px 10px;border-radius:20px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Layout */
.layout{display:flex;flex:1;min-height:0;overflow:hidden}
/* Sidebar */
.sb{width:260px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 8px;border-bottom:1px solid var(--bdr)}
.sb-search{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--muted)}
.sb-list{overflow-y:auto;flex:1;padding:8px 8px}
.sb-section{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 6px 4px}
.sb-item{padding:7px 10px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s;border:1px solid transparent;margin-bottom:2px}
.sb-item:hover{background:var(--surf2);border-color:var(--bdr)}
.sb-item.active{background:var(--accent-dim);border-color:rgba(91,156,246,0.3)}
.sb-code{font-family:var(--mono);font-size:12px;color:var(--accent);min-width:38px;font-weight:500}
.sb-name{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sev{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sev-h{background:var(--danger)}.sev-m{background:var(--warn)}.sev-l{background:var(--ok)}.sev-i{background:var(--muted)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
/* Messages */
.msg{display:flex;gap:10px;max-width:820px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.ai .av{background:linear-gradient(135deg,#3b82f6,#6366f1)}
.msg.user .av{background:var(--surf3);border:1px solid var(--bdr2)}
.bubble{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:12px 15px;font-size:13px;line-height:1.75;flex:1;min-width:0}
.msg.user .bubble{background:var(--accent-dim);border-color:rgba(91,156,246,0.25)}
/* Welcome */
.welcome{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:22px;max-width:600px}
.wt{font-size:16px;font-weight:500;margin-bottom:8px}
.wd{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 10px;border:1px solid var(--bdr2);border-radius:16px;cursor:pointer;transition:all .15s;color:var(--muted);background:transparent;font-family:var(--sans)}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* Error card */
.ecard{border-radius:10px;padding:14px;border:1px solid;margin-top:6px}
.ecard.h{border-color:rgba(244,122,122,.25);background:var(--danger-dim)}
.ecard.m{border-color:rgba(245,167,66,.25);background:var(--warn-dim)}
.ecard.l{border-color:rgba(82,199,122,.25);background:var(--ok-dim)}
.ecard.i{border-color:var(--bdr2);background:var(--surf2)}
.ehead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ebadge{font-family:var(--mono);font-size:13px;font-weight:500;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,0.07)}
.ename{font-size:14px;font-weight:500}
.stag{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.stag-h{background:rgba(244,122,122,.18);color:var(--danger)}
.stag-m{background:rgba(245,167,66,.18);color:var(--warn)}
.stag-l{background:rgba(82,199,122,.18);color:var(--ok)}
.stag-i{background:var(--surf3);color:var(--muted)}
.sec{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 5px}
.causes{list-style:none;display:flex;flex-direction:column;gap:3px}
.ci{font-size:13px;padding:5px 9px;background:rgba(255,255,255,0.04);border-radius:6px;display:flex;gap:7px}
.sols{list-style:none;display:flex;flex-direction:column;gap:5px}
.si{font-size:13px;padding:7px 11px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:2px solid;line-height:1.6}
.h .si{border-left-color:var(--danger)}.m .si{border-left-color:var(--warn)}.l .si{border-left-color:var(--ok)}.i .si{border-left-color:var(--muted)}
.pm{display:inline-block;font-family:var(--mono);font-size:11px;background:rgba(91,156,246,.15);color:var(--accent);padding:1px 5px;border-radius:4px;margin:0 1px}
.note{margin-top:10px;font-size:12px;padding:7px 11px;border-radius:7px;line-height:1.6}
.note-warn{background:rgba(244,122,122,.08);border-left:2px solid var(--danger)}
.note-info{background:rgba(91,156,246,.08);border-left:2px solid var(--accent)}
/* Markdown in AI response */
.bubble strong{font-weight:500;color:var(--txt)}
.bubble ul{margin:6px 0 6px 16px}
.bubble li{margin:3px 0}
.bubble code{font-family:var(--mono);font-size:12px;background:var(--surf3);padding:1px 5px;border-radius:4px;color:var(--accent)}
/* Typing */
.typing-wrap{display:flex;gap:10px;max-width:820px}
.typing{display:flex;gap:4px;align-items:center;padding:14px 15px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.1s infinite}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
/* Input */
.input-wrap{border-top:1px solid var(--bdr);padding:12px 16px;background:var(--surf)}
.quick-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.irow{display:flex;gap:8px;align-items:flex-end}
.ta-wrap{flex:1;position:relative}
textarea.inp{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:10px 14px;outline:none;resize:none;min-height:42px;max-height:110px;transition:border-color .15s;line-height:1.5}
textarea.inp:focus{border-color:var(--accent)}
textarea.inp::placeholder{color:var(--muted)}
.send{width:40px;height:40px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send:hover{background:#7ab4ff}.send:disabled{opacity:.4;cursor:not-allowed}
.send svg{width:16px;height:16px;fill:#0d0f14}
.mode-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.mode-label{font-size:11px;color:var(--muted)}
.mode-btn{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--bdr2);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--sans);transition:all .12s}
.mode-btn.on{background:var(--accent-dim);border-color:rgba(91,156,246,.35);color:var(--accent)}
/* Streaming text cursor */
.cursor{display:inline-block;width:2px;height:14px;background:var(--accent);margin-left:2px;animation:blink .8s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:700px){.sb{display:none}}

.lang-bar{background:var(--surf2);border-bottom:1px solid var(--bdr);padding:7px 16px;display:flex;align-items:center;gap:8px}
.lang-label{font-size:11px;color:var(--muted)}
.lang-btn{font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--sans);transition:all .15s}
.lang-btn.on{background:var(--accent-dim);border-color:rgba(91,156,246,.4);color:var(--accent);font-weight:500}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">⚡</div>
  <div class="hdr-info">
    <div class="hdr-title" id="hdrTitle">SJ-P1 智能故障診斷助理</div>
    <div class="hdr-sub" id="hdrSub">日立變頻器 · 全錯誤代碼 · 內建智能分析</div>
  </div>
  <div class="hdr-badge"><span class="hdr-dot"></span><span id="hdrBadge">AI 已就緒</span></div>
</div>

<div class="lang-bar">
  <span class="lang-label" id="langLabel">語言：</span>
  <button class="lang-btn on" id="btnZH" onclick="setLang('zh')">🇹🇼 繁體中文</button>
  <button class="lang-btn" id="btnEN" onclick="setLang('en')">🇺🇸 English</button>
  <button class="lang-btn" id="btnJA" onclick="setLang('ja')">🇯🇵 日本語</button>
</div>
<div class="layout">
<div class="sb">
  <div class="sb-head">
    <input class="sb-search" type="text" placeholder="搜尋錯誤代碼或名稱…" id="sbSearch" oninput="filterSidebar(this.value)">
  </div>
  <div class="sb-list" id="sbList"></div>
</div>

<div class="main">
  <div class="chat" id="chat">
    <div class="welcome">
      <div class="wt" id="welcomeTitle">👋 SJ-P1 智能故障診斷助理</div>
      <div class="wd" id="welcomeDesc">輸入面板上顯示的<strong>錯誤代碼</strong>（如 E001），或用<strong>自然語言描述問題</strong>。智能引擎將分析並給出排查建議。</div>
      <div class="chips" id="quickChips">
        <button class="chip" onclick="ask('E001 過電流')">E001 過電流</button>
        <button class="chip" onclick="ask('E007 過電壓')">E007 過電壓</button>
        <button class="chip" onclick="ask('E005 馬達過載')">E005 過載</button>
        <button class="chip" onclick="ask('E009 欠電壓')">E009 欠電壓</button>
        <button class="chip" onclick="ask('馬達啟動後立刻跳脫，原因是什麼？')">馬達啟動跳脫</button>
        <button class="chip" onclick="ask('如何重置錯誤警報？')">如何重置警報</button>
        <button class="chip" onclick="ask('SJ-P1 保養週期建議')">保養週期</button>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="mode-row">
      <span class="mode-label" id="modeLabel">回答模式：</span>
      <button class="mode-btn on" id="modeAI" onclick="setMode('ai')">🤖 AI 智能回答</button>
      <button class="mode-btn" id="modeDB" onclick="setMode('db')">📋 快速查詢</button>
    </div>
    <div class="quick-chips">
      <button class="chip" onclick="ask('E001')">E001</button>
      <button class="chip" onclick="ask('E005')">E005</button>
      <button class="chip" onclick="ask('E007')">E007</button>
      <button class="chip" onclick="ask('E009')">E009</button>
      <button class="chip" onclick="ask('E012')">E012</button>
      <button class="chip" onclick="ask('E014')">E014</button>
      <button class="chip" onclick="ask('E020')">E020</button>
      <button class="chip" onclick="ask('E039')">E039</button>
    </div>
    <div class="irow">
      <div class="ta-wrap">
        <textarea class="inp" id="inp" placeholder="輸入錯誤代碼或描述症狀…" rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      </div>
      <button class="send" id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>
</div>

<script>
// ── Error DB (full list from Chapter 18) ──────────────────────────────────────
const DB = {
  E001:{n:'過電流錯誤',s:'h',sl:'嚴重',d:'逆變器輸出電流超過額定值，保護電路切斷輸出。最常見錯誤之一。',causes:['加速時間過短，啟動電流過大','馬達或負載發生機械卡死、堵轉','逆變器容量不足，超過額定電流','減速時負載慣性過大，產生再生電流','輸出側短路或接地故障'],sols:['延長加速時間 <span class="pm">[FA-01]</span>（加速時間1），建議先嘗試增加 50%','確認馬達與負載是否有機械卡死，手動轉動確認是否可自由旋轉','確認逆變器規格與馬達額定電流是否匹配','延長減速時間 <span class="pm">[FA-12]</span>，或加裝制動電阻器','使用過電流抑制功能 <span class="pm">[bA120]</span> 自動限制加速電流'],rst:true,note:'info',noteText:'重置：確認運轉指令 OFF 後，按面板 STOP/RESET 鍵，或將 RS 端子 ON→OFF。'},
  E005:{n:'馬達過載錯誤',s:'h',sl:'嚴重',d:'電子熱保護功能偵測到馬達持續過載，為保護馬達而切斷輸出。',causes:['長時間超過額定負載的重載狀態','電子熱保護設定值 [bC110] 與馬達實際額定不符','低速長時間運轉，馬達散熱不足','機械系統阻力增加（軸承磨損、傳動機構異常）'],sols:['重新評估負載條件，確認馬達額定容量','確認 <span class="pm">[bC110]</span> 設定與馬達銘板額定電流相符','低速長期運轉應選用含強制冷卻風扇的馬達（VF 馬達）','檢查傳動機構，確認無異常阻力或機械損耗'],rst:true,note:'warn',noteText:'注意：若 [bC112]=00，錯誤後 10 秒內不接受重置，請稍待後再按 RESET。'},
  E006:{n:'制動電阻器過負載錯誤',s:'m',sl:'警告',d:'制動電阻器使用率超過設定上限，為保護制動電阻器切斷輸出。',causes:['減速時間過短，制動頻率過高','負載慣性過大，再生能量超過電阻耐受','制動電阻器容量選型過小'],sols:['延長減速時間 <span class="pm">[FA-12]</span>','確認制動電阻器選型符合實際負載的再生能量','考慮使用回生轉換器取代制動電阻器','調整 <span class="pm">[bA-60]</span> 制動電阻使用率上限'],rst:true,note:'info',noteText:'重置前請確認電阻器已冷卻，避免重複過熱損壞。'},
  E007:{n:'過電壓錯誤',s:'m',sl:'警告',d:'P-N 端直流電壓過高（200V 級超過約 410VDC，400V 級超過約 820VDC），系統切斷輸出。',causes:['減速時間過短，馬達回生電力無法快速消耗','負載慣性過大','外力驅動馬達旋轉（風機被風力驅動、起重機下降）','電源電壓本身過高或不穩定'],sols:['延長減速時間 <span class="pm">[FA-12]</span>','啟用過電壓抑制功能 <span class="pm">[bA140]</span>','加裝制動電阻器 + 制動單元（BRD）','考慮使用回生轉換器將多餘能量回送電網','加裝 AC 電抗器改善電源電壓波動'],rst:true,note:'info',noteText:'若電源電壓本身偏高，應優先改善電源環境。'},
  E008:{n:'記憶體錯誤',s:'h',sl:'嚴重',d:'逆變器內建記憶體（EEPROM）發生異常，可能導致參數設定遺失。',causes:['電源瞬間中斷發生於參數寫入過程中','強烈電磁干擾導致記憶體資料損毀','記憶體元件老化或硬體損壞'],sols:['嘗試重新投入電源，部分情況可自動恢復','重新上電後立即確認各參數設定是否正常','若事先備份參數，可執行參數還原','若多次重新上電後仍發生，需送修更換記憶體元件'],rst:false,note:'warn',noteText:'建議定期使用操作面板的參數備份功能，避免設定遺失。'},
  E009:{n:'欠電壓錯誤',s:'m',sl:'警告',d:'逆變器主電源電壓下降至過低（200V 級約 160VDC，400V 級約 320VDC），為避免電路損壞切斷輸出。',causes:['電源供電中斷或瞬時停電','電源電壓過低或電壓波動幅度過大','電源配線接觸不良、熔斷器斷路','長期使用後，主電路電容器劣化'],sols:['確認電源電壓在規格範圍內（200V 級：180~240VAC）','檢查電源配線、端子台接續，確認熔斷器或斷路器狀態','考慮啟用瞬停不停功能 <span class="pm">[bA-30]</span>','若使用年限超過 10 年，考慮更換主電路電容（保養項目）'],rst:true,note:'info',noteText:'確認電源恢復後再進行重置操作。'},
  E010:{n:'電流檢測器錯誤',s:'h',sl:'嚴重',d:'逆變器內建電流感測電路發生異常。',causes:['附近存在強烈電磁干擾源','電流檢測迴路硬體損壞'],sols:['確認附近是否有強干擾源，嘗試增加屏蔽或移除干擾源','重置後若仍發生，表示電流檢測迴路可能損壞，需聯繫服務人員維修'],rst:false,note:'warn',noteText:'此為硬體層級錯誤，若重置後仍持續發生，需要專業維修。'},
  E011:{n:'CPU 錯誤',s:'h',sl:'嚴重',d:'逆變器內建 CPU 發生異常或誤動作，系統切斷輸出。',causes:['電磁干擾導致 CPU 誤動作','CPU 硬體損壞'],sols:['重新投入電源，若可恢復則可能是干擾所致','確認逆變器接地是否確實（PE 端子）','若重新上電後無法恢復，需聯繫服務人員更換主板'],rst:false,note:'warn',noteText:'若反覆發生，應檢查安裝環境的電磁干擾情況。'},
  E012:{n:'外部跳脫錯誤',s:'l',sl:'一般',d:'接收到外部裝置的跳脫信號（EXT 端子功能啟動），逆變器切斷輸出。此為正常的外部保護動作。',causes:['外部保護裝置（過熱繼電器、限位開關等）動作','端子邏輯接線錯誤（a/b 接點設定相反）','配線錯誤或端子接觸不良'],sols:['確認外部保護裝置的實際狀態，了解觸發原因','確認 EXT 端子的接點邏輯，a 接點或 b 接點是否與外部裝置一致','檢查輸入端子 <span class="pm">[CA-01]～[CA-11]</span> 的功能設定是否正確','確認配線是否有接觸不良或斷線'],rst:true,note:'info',noteText:'需優先確認外部設備狀態，再決定是否重置。'},
  E013:{n:'USP 錯誤（啟動自保護）',s:'l',sl:'一般',d:'電源投入時偵測到運轉指令已處於 ON 狀態，為防止意外啟動而觸發保護。',causes:['電源投入前，運轉指令（FW/RV 端子）已在 ON 狀態','控制系統在停電後自動恢復輸出運轉指令'],sols:['確認電源投入前，運轉指令端子必須處於 OFF 狀態','重置後先確認運轉指令已關閉，再重新給予運轉指令'],rst:true,note:'info',noteText:'此為安全保護設計，建議由操作人員確認安全後再手動啟動。'},
  E014:{n:'接地故障錯誤',s:'h',sl:'嚴重',d:'電源投入時偵測到逆變器輸出與馬達之間存在接地故障，為保護逆變器切斷輸出。',causes:['馬達絕緣劣化，相線對地短路','配線老化、絕緣破損，導線接觸接地','潮濕環境造成絕緣電阻降低'],sols:['關閉電源後，拆除馬達配線，用絕緣電阻計測量馬達線圈與配線的對地絕緣電阻（應 >1MΩ）','確認接地故障位置後，更換老化配線或送修馬達','改善安裝環境，避免潮濕或腐蝕性氣體侵入'],rst:false,note:'warn',noteText:'⚠️ 切勿在確認故障原因前就直接重置並上電，以免造成更大損壞甚至安全事故。'},
  E015:{n:'受電過電壓錯誤',s:'m',sl:'警告',d:'逆變器處於輸出停止狀態時，受電電壓持續過高達 100 秒以上，觸發保護。',causes:['電源電壓本身過高','電源環境不穩定，電壓波動超出規格'],sols:['確認電源電壓是否在規格範圍內','重新檢視電源環境，必要時加裝 AC 電抗器','確認 <span class="pm">[bb-61]</span> 受電過電壓選擇及 <span class="pm">[bb-62]</span> 等級設定'],rst:true,note:'info',noteText:''},
  E016:{n:'瞬時停電錯誤',s:'m',sl:'警告',d:'發生瞬時停電時，系統切斷輸出。停電時間過長則視同一般電源中斷。',causes:['電源瞬間中斷（電網擾動、開關切換）','主電源 R/S/T 電壓降低'],sols:['確認電源品質，考慮加裝 UPS 不斷電系統','啟用瞬停重試功能 <span class="pm">[bA-30]</span>，允許短暫停電後自動重啟','若供電環境不穩定，考慮加裝穩壓器或 AC 電抗器'],rst:true,note:'info',noteText:''},
  E019:{n:'溫度檢測器錯誤',s:'h',sl:'嚴重',d:'逆變器內部溫度感測元件發生異常。',causes:['溫度感測電路損壞','強烈電磁干擾'],sols:['確認安裝環境溫度是否在規格範圍內','若重置後仍發生，可能是溫度感測元件損壞，需維修'],rst:false,note:'warn',noteText:'此為硬體故障，需聯繫服務人員。'},
  E020:{n:'冷卻風扇轉速降低錯誤',s:'m',sl:'警告',d:'冷卻風扇轉速降低，冷卻效能不足，導致逆變器溫度過高，系統保護切斷輸出。',causes:['散熱鰭片或進氣口被粉塵、異物堵塞','冷卻風扇軸承磨損，轉速下降','風扇電源線路異常或風扇損壞','安裝環境溫度過高，超過規格上限（50°C）'],sols:['關閉電源後清潔散熱鰭片與進氣口的積塵（壓縮空氣吹除）','確認逆變器安裝空間有足夠通風，上下左右保留規定間距','若風扇轉速異常，需更換冷卻風扇（消耗部品）','確認環境溫度在規格範圍內，必要時加強散熱'],rst:true,note:'info',noteText:'冷卻風扇屬消耗品，建議每 2~3 年定期更換。'},
  E021:{n:'溫度錯誤（過熱保護）',s:'h',sl:'嚴重',d:'逆變器內部溫度超過保護動作溫度，切斷輸出。請同時參閱 E020。',causes:['散熱鰭片嚴重積塵導致散熱能力大幅下降','安裝環境溫度過高','冷卻風扇完全停止運轉','逆變器持續過載運轉'],sols:['立即清潔散熱鰭片（關閉電源後執行）','確認並改善安裝環境的溫度條件','確認冷卻風扇是否正常運轉，必要時更換','降低負載或選用更大容量逆變器'],rst:true,note:'warn',noteText:'溫度冷卻後才能重置，重置後需確認散熱改善情況再恢復運轉。'},
  E024:{n:'輸入缺相錯誤',s:'m',sl:'警告',d:'偵測到三相電源輸入有一相或多相斷路，電源不平衡保護動作。',causes:['電源配線有一相接觸不良或斷線','電源側熔斷器（保險絲）斷路','電力公司供電側缺相','採用單相輸入'],sols:['用電壓計測量輸入端 R、S、T 三相電壓，確認各相電壓是否正常','檢查主迴路輸入端子的配線鎖緊狀態，確認無鬆脫','確認電源側配電盤熔斷器、斷路器狀態','確認輸入線以三相接線方式連接'],rst:true,note:'info',noteText:'需將 [bb-65] 設為 01 才會啟用此缺相檢測功能。'},
  E030:{n:'IGBT 錯誤',s:'h',sl:'嚴重',d:'發生瞬時過電流或主元件（IGBT）故障時，為保護主元件切斷輸出。',causes:['輸出線發生接地故障或短路','馬達轉動受拘束（堵轉）','IGBT 功率元件本身損壞'],sols:['電源斷開後，確認馬達配線及馬達是否有斷線或短路','拆除馬達配線後若仍發生故障，表示設備損壞，需進行維修','排除馬達受拘束的原因'],rst:false,note:'warn',noteText:'此錯誤若拆除馬達配線後仍持續，代表逆變器主電路損壞，需要專業維修。'},
  E034:{n:'輸出缺相錯誤',s:'m',sl:'警告',d:'偵測到逆變器輸出至馬達的三相配線有缺相（斷線、接觸不良或馬達內部斷線）。僅在 5Hz～100Hz 範圍內偵測。',causes:['輸出側配線（U、V、W 至馬達）有斷線或接觸不良','馬達線圈內部斷線','電磁接觸器或端子台接點接觸不良','輸出為單相連接'],sols:['確認逆變器輸出端 U、V、W 至馬達的三相配線，用電阻計確認各相通路','拆除配線後用搖錶確認馬達三相線圈電阻是否平衡（差異應小於 10%）','確認中途電磁接觸器、端子台等接點狀態','將輸出線接成三相'],rst:true,note:'info',noteText:'需將 [bb-66] 設為 01 才會啟用此保護功能。'},
  E035:{n:'熱敏電阻錯誤',s:'m',sl:'警告',d:'外部熱敏電阻偵測到溫度異常時，逆變器切斷輸出。',causes:['馬達冷卻不良，持續過重負載','熱敏電阻功能設定錯誤（[Cb-40]）','熱敏電阻元件故障','噪音干擾導致誤動作'],sols:['改善馬達冷卻環境，重新檢視驅動環境','確認 <span class="pm">[Cb-40]</span> 熱敏電阻功能設定是否正確','檢查熱敏電阻器是否正常（量測電阻值）','進行配線分離等噪音對策'],rst:true,note:'info',noteText:''},
  E036:{n:'制動器（煞車）錯誤',s:'m',sl:'警告',d:'逆變器輸出制動器開啟信號後，在確認等待時間內未收到制動確認信號。',causes:['制動確認信號線斷線','煞車功能設定不當'],sols:['檢查煞車確認信號 <span class="pm">[BOK]</span> 的配線及信號狀態','檢討煞車確認等待時間及輸入端子邏輯'],rst:true,note:'info',noteText:''},
  E038:{n:'低速域過負載錯誤',s:'m',sl:'警告',d:'當輸出頻率低於 0.2Hz 時，電子熱過載偵測到過載狀態，切斷輸出以保護主元件。',causes:['在極低速（0.2Hz 以下）區域馬達負載過重'],sols:['在低速區域降低負載','若錯誤頻繁發生，需選擇容量較大的逆變器以配合馬達'],rst:true,note:'info',noteText:''},
  E039:{n:'控制器（逆變器）過負載錯誤',s:'h',sl:'嚴重',d:'逆變器本體的電子熱保護偵測到逆變器自身過載（保護逆變器本體，與 E005 馬達過載不同）。',causes:['長時間超過逆變器額定電流持續運轉','環境溫度過高，逆變器允許電流降低（降額）','頻繁加減速或重負載操作'],sols:['降低負載或選用更大容量的逆變器','確認安裝環境溫度，改善散熱條件','確認使用額定模式 <span class="pm">[Ub-03]</span>（LD/ND/HD）在額定電流範圍內','減少加減速頻率，避免持續高電流操作'],rst:true,note:'warn',noteText:'錯誤發生後 10 秒內不接受重置，請稍待後再操作。'},
  E040:{n:'操作面板通訊錯誤',s:'l',sl:'一般',d:'操作面板（VOP）與通信線路因噪音干擾、接觸不良或斷線等導致逾時錯誤。',causes:['面板接線接觸不良或斷線','強烈噪音干擾通訊線路'],sols:['確認操作面板的連接線是否接觸良好','進行配線分離等噪音對策','可透過 <span class="pm">[UA-20]</span> 設定錯誤的有效與否'],rst:true,note:'info',noteText:''},
  E041:{n:'RS485 通訊錯誤',s:'l',sl:'一般',d:'RS485 通訊（Modbus-RTU）因噪音、接觸不良或設定不一致等導致逾時。',causes:['通訊線接觸不良或斷線','噪音干擾通訊線路','與上位裝置的通訊設定不一致（波特率、協議等）'],sols:['確認 RS485 配線是否接觸良好','進行配線分離等噪音對策','確認 <span class="pm">[CF-01]～[CF-08]</span> 通訊設定與上位裝置一致'],rst:true,note:'info',noteText:''},
  E042:{n:'RTC 錯誤',s:'l',sl:'一般',d:'操作面板（VOP）內建的 RTC（即時時鐘）資料回復為初始資料。',causes:['操作面板中安裝的備用電池已耗盡'],sols:['重新安裝電池並設定日期與時間'],rst:true,note:'info',noteText:''},
  E043:{n:'EzSQ 不當指令錯誤',s:'l',sl:'一般',d:'使用 EzSQ 程式功能時，程式中包含不正確的指令。',causes:['EzSQ 程式指令錯誤'],sols:['確認並修正 EzSQ 程式中的指令內容'],rst:true,note:'info',noteText:''},
  E044:{n:'EzSQ 巢狀次數錯誤',s:'l',sl:'一般',d:'EzSQ 程式的子程序、for/next 語句等巢狀次數超過 8 次。',causes:['程式結構過於複雜，巢狀超過限制'],sols:['簡化 EzSQ 程式結構，減少巢狀層次'],rst:true,note:'info',noteText:''},
  E045:{n:'EzSQ 執行指令錯誤',s:'l',sl:'一般',d:'EzSQ 程式執行過程中發生指令執行錯誤。',causes:['程式執行中遇到無法處理的指令'],sols:['確認 EzSQ 程式邏輯，修正相關指令'],rst:true,note:'info',noteText:''},
  'E050-E059':{n:'EzSQ 使用者指定錯誤 0～9',s:'l',sl:'一般',d:'EzSQ 程式執行中，程式自行指定發出的錯誤（trip 命令）。',causes:['EzSQ 程式中的 trip 命令被觸發'],sols:['確認 EzSQ 程式中 trip 命令的條件是否符合預期，並修正程式邏輯'],rst:true,note:'info',noteText:''},
  'E060-E069':{n:'選用件插槽 1 錯誤 0～9',s:'m',sl:'警告',d:'裝設於選用件插槽 1（最左側）的選用卡匣偵測到錯誤。',causes:['選用件未確實裝設','選用件使用方法有誤'],sols:['確認選用件的裝設狀態是否確實','詳細請參閱所裝設選用件之指南'],rst:true,note:'info',noteText:'不同選用件的錯誤內容各有不同，請參考各選用件指南。'},
  'E070-E079':{n:'選用件插槽 2 錯誤 0～9',s:'m',sl:'警告',d:'裝設於選用件插槽 2（正面中央）的選用卡匣偵測到錯誤。',causes:['選用件未確實裝設','選用件使用方法有誤'],sols:['確認選用件的裝設狀態是否確實','詳細請參閱所裝設選用件之指南'],rst:true,note:'info',noteText:''},
  'E080-E089':{n:'選用件插槽 3 錯誤 0～9',s:'m',sl:'警告',d:'裝設於選用件插槽 3（正面最右側）的選用卡匣偵測到錯誤。',causes:['選用件未確實裝設','選用件使用方法有誤'],sols:['確認選用件的裝設狀態是否確實','詳細請參閱所裝設選用件之指南'],rst:true,note:'info',noteText:''},
  'E090-E093':{n:'STO 安全功能錯誤',s:'h',sl:'嚴重',d:'STO（安全扭矩遮斷）迴路的路徑異常，或 STO 電路被遮斷。',causes:['安全功能電路路徑異常','ST1/ST2 端子同時輸入（特定設定下）','STO 輸入切換許容時間超過設定值'],sols:['確認 ST1/ST2 端子的接線及信號狀態','詳細請參閱別冊《安全功能指南》（NT2512□）'],rst:false,note:'warn',noteText:'安全功能相關錯誤，需參閱安全功能指南，不可隨意重置。'},

// ── Sidebar setup ────────────────────────────────────────────────────────────
const items = Object.entries(DB).map(([k,v])=>({code:k,name:v.n,sev:v.s}));
function renderSidebar(filter=''){
  const el=document.getElementById('sbList');
  if(!el)return;
  const f=(filter||'').toLowerCase();
  const allItems=Object.entries(DB);
  const filtered=allItems.filter(([k,v])=>{
    const n=lang!=='zh'&&NAMES[k]?NAMES[k][lang]||v.n:v.n;
    return !f||(k.toLowerCase().includes(f)||n.toLowerCase().includes(f));
  });
  el.innerHTML=filtered.map(([k,v])=>{
    const n=lang!=='zh'&&NAMES[k]?NAMES[k][lang]||v.n:v.n;
    return `<div class="sb-item" id="sb-${k}" onclick="ask('${k}')">
      <span class="sb-code">${k}</span>
      <span class="sb-name">${n}</span>
      <span class="sev sev-${v.s}"></span>
    </div>`;
  }).join('');
}
function filterSidebar(v){renderSidebar(v)}

}

// ── Chat helpers ──────────────────────────────────────────────────────────────
let busy = false;
function addMsg(type, html){
  const d = document.createElement('div');
  d.className='msg '+type;
  d.innerHTML=`<div class="av">${type==='ai'?'⚡':'👤'}</div><div class="bubble">${html}</div>`;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({block:'end',behavior:'smooth'});
  return d.querySelector('.bubble');
}
function showTyping(){
  const d=document.createElement('div');d.className='typing-wrap';d.id='typ';
  d.innerHTML='<div class="av">⚡</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  document.getElementById('chat').appendChild(d);d.scrollIntoView({block:'end',behavior:'smooth'});
}
function rmTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function setSend(on){document.getElementById('sendBtn').disabled=!on;busy=!on;}

ssed air)", "Ensure adequate ventilation clearance around inverter", "If fan speed is abnormal, replace cooling fan (consumable part)", "Verify ambient temperature is within specification"], "noteText": "Cooling fan is a consumable part — recommended replacement every 2~3 years.", "note": "info"}, "ja": {"n": "冷却ファン回転数低下エラー", "sl": "警告", "d": "冷却ファンの回転数が低下し、冷却性能が不足したためインバータ温度が上昇し、保護トリップしました。", "causes": ["ヒートシンクフィンや吸気口のホコリ詰まり", "冷却ファンの軸受磨耗による回転数低下", "ファン電源回路の異常またはファン故障", "設置環境温度が高すぎる（上限50°C超）"], "sols": ["電源遮断後、ヒートシンクと吸気口のホコリを清掃（エアブロー）", "インバータ周囲の通風スペースを確保", "ファン回転数が異常な場合は冷却ファンを交換（消耗品）", "周囲温度が仕様範囲内か確認"], "noteText": "冷却ファンは消耗品です。2～3年ごとの定期交換を推奨します。", "note": "info"}}, "E039": {"en": {"n": "Inverter Overload Error", "sl": "Critical", "d": "Inverter's own electronic thermal protection detected overload of the inverter itself (distinct from E005 motor overload).", "causes": ["Continuous operation exceeding inverter rated current", "High ambient temperature reducing inverter current rating (derating)", "Frequent acceleration/deceleration or heavy load operation"], "sols": ["Reduce load or select larger capacity inverter", "Check ambient temperature; improve cooling conditions", "Verify load duty rating <span class=\"pm\">[Ub-03]</span> (LD/ND/HD) is within rated current", "Reduce frequency of acceleration/deceleration operations"], "noteText": "Reset is not accepted for 10 seconds after this error. Please wait before resetting.", "note": "warn"}, "ja": {"n": "インバータ過負荷エラー", "sl": "重大", "d": "インバータ本体の電子サーマル保護がインバータ自身の過負荷を検出しました（E005モーター過負荷とは異なります）。", "causes": ["インバータ定格電流を超えた継続運転", "高周囲温度によるインバータ電流定格低下（ディレーティング）", "頻繁な加減速または重負荷運転"], "sols": ["負荷を低減するか、より大容量のインバータを選択", "周囲温度を確認し、冷却を改善", "負荷仕様 <span class=\"pm\">[Ub-03]</span>（LD/ND/HD）が定格電流範囲内か確認", "加減速頻度を低減"], "noteText": "このエラー後10秒間はリセット不可。しばらく待ってからリセットしてください。", "note": "warn"}}, "E015": {"en": {"n": "Supply Overvoltage Error", "sl": "Warning", "d": "Supply voltage remained too high for over 100 seconds while inverter output was stopped.", "causes": ["Supply voltage itself is too high", "Unstable power supply environment"], "sols": ["Verify supply voltage is within specification", "Inspect power supply environment; install AC reactor if necessary", "Check parameter <span class=\"pm\">[bb-61]</span> overvoltage selection and <span class=\"pm\">[bb-62]</span> level setting"], "noteText": "", "note": "info"}, "ja": {"n": "受電過電圧エラー", "sl": "警告", "d": "インバータ出力停止中に受電電圧が100秒以上高すぎる状態が継続しました。", "causes": ["電源電圧自体が高い", "電源環境が不安定"], "sols": ["電源電圧が仕様範囲内か確認", "電源環境を点検し、必要に応じてACリアクトルを設置", "パラメータ <span class=\"pm\">[bb-61]</span> 過電圧選択と <span class=\"pm\">[bb-62]</span> レベル設定を確認"], "noteText": "", "note": "info"}}, "E016": {"en": {"n": "Momentary Power Loss Error", "sl": "Warning", "d": "Momentary power failure detected; inverter tripped output.", "causes": ["Momentary power interruption (grid disturbance, switching)", "Main supply R/S/T voltage drop"], "sols": ["Check power supply quality; consider installing UPS", "Enable momentary power loss ride-through <span class=\"pm\">[bA-30]</span>", "If supply is unstable, consider voltage stabilizer or AC reactor"], "noteText": "", "note": "info"}, "ja": {"n": "瞬時停電エラー", "sl": "警告", "d": "瞬時停電が発生したため、出力を遮断しました。", "causes": ["瞬時電源中断（電網擾乱、スイッチング）", "主電源R/S/T電圧低下"], "sols": ["電源品質を確認し、UPS設置を検討", "瞬停再起動機能 <span class=\"pm\">[bA-30]</span> を有効化", "電源が不安定な場合は安定化電源またはACリアクトルを検討"], "noteText": "", "note": "info"}}, "E019": {"en": {"n": "Temperature Detector Error", "sl": "Critical", "d": "Internal temperature sensing element abnormality detected.", "causes": ["Temperature sensing circuit failure", "Strong electromagnetic interference"], "sols": ["Verify ambient temperature is within specification", "If error persists after reset, temperature sensor may be damaged — contact service"], "noteText": "This is a hardware fault. Contact service personnel.", "note": "warn"}, "ja": {"n": "温度検出器エラー", "sl": "重大", "d": "内蔵温度検出素子に異常が発生しました。", "causes": ["温度検出回路の故障", "強い電磁ノイズ"], "sols": ["周囲温度が仕様範囲内か確認", "リセット後も発生する場合は温度センサー故障の可能性があるため修理が必要"], "noteText": "ハードウェア故障です。サービス担当者に連絡してください。", "note": "warn"}}, "E021": {"en": {"n": "Overheat Error", "sl": "Critical", "d": "Inverter internal temperature exceeded protection threshold; output tripped. Also refer to E020.", "causes": ["Severely clogged heat sink fins", "Ambient temperature too high", "Cooling fan completely stopped", "Continuous inverter overload"], "sols": ["Immediately clean heat sink fins (after powering off)", "Verify and improve ambient temperature conditions", "Check cooling fan operation; replace if necessary", "Reduce load or select larger capacity inverter"], "noteText": "Reset only after temperature has cooled. Confirm cooling improvement before resuming operation.", "note": "warn"}, "ja": {"n": "温度エラー（過熱保護）", "sl": "重大", "d": "インバータ内部温度が保護動作温度を超えたため、出力を遮断しました。E020も参照してください。", "causes": ["ヒートシンクの著しいホコリ詰まり", "設置環境温度が高すぎる", "冷却ファンが完全に停止", "インバータの継続的な過負荷運転"], "sols": ["直ちにヒートシンクを清掃（電源遮断後）", "設置環境の温度条件を確認・改善", "冷却ファンの動作を確認し、必要であれば交換", "負荷を低減するか、より大容量のインバータを選択"], "noteText": "温度が冷却されてからリセットしてください。運転再開前に冷却改善を確認してください。", "note": "warn"}}, "E024": {"en": {"n": "Input Phase Loss Error", "sl": "Warning", "d": "Phase loss detected in three-phase input supply; protection activated.", "causes": ["One phase of supply wiring has poor contact or broken wire", "Supply-side fuse blown", "Phase loss from utility supply", "Single-phase input connected"], "sols": ["Measure input voltages R, S, T with voltmeter; verify all phases normal", "Check input terminal wiring tightness", "Verify supply-side fuses and circuit breakers", "Ensure input is connected as three-phase"], "noteText": "Set [bb-65] to 01 to enable this phase loss detection function.", "note": "info"}, "ja": {"n": "入力欠相エラー", "sl": "警告", "d": "三相電源入力の欠相を検出し、電源不平衡保護が動作しました。", "causes": ["電源配線の一相の接触不良または断線", "電源側ヒューズ断線", "電力会社の供給側欠相", "単相入力での使用"], "sols": ["電圧計で入力端R・S・T三相電圧を測定し、各相電圧が正常か確認", "主回路入力端子の配線締め付けを確認", "電源側配電盤のヒューズ・ブレーカーの状態を確認", "入力線を三相接線で接続"], "noteText": "この欠相検出機能を有効にするには [bb-65] を01に設定してください。", "note": "info"}}, "E030": {"en": {"n": "IGBT Error", "sl": "Critical", "d": "Instantaneous overcurrent or main element (IGBT) failure detected; output tripped to protect main elements.", "causes": ["Output wiring ground fault or short circuit", "Motor rotor locked (stall)", "IGBT power element failure"], "sols": ["Power off; check motor wiring and motor for short circuit or broken wire", "If error persists after disconnecting motor wiring, equipment is damaged — send for repair", "Remove cause of motor mechanical lock"], "noteText": "If error persists after disconnecting motor wiring, inverter main circuit is damaged. Professional repair required.", "note": "warn"}, "ja": {"n": "IGBTエラー", "sl": "重大", "d": "瞬時過電流または主素子（IGBT）故障が発生したため、主素子保護のため出力を遮断しました。", "causes": ["出力配線の地絡または短絡", "モーターの拘束（ロック）", "IGBTパワー素子の故障"], "sols": ["電源を遮断後、モーター配線の短絡または断線を確認", "モーター配線を外しても故障が続く場合は、設備損傷のため修理が必要", "モーター機械的拘束の原因を除去"], "noteText": "モーター配線を外しても発生し続ける場合は、インバータ主回路損傷です。専門の修理が必要です。", "note": "warn"}}, "E034": {"en": {"n": "Output Phase Loss Error", "sl": "Warning", "d": "Phase loss detected in output wiring to motor (broken wire, poor contact, or motor winding break). Detected only in 5Hz~100Hz range.", "causes": ["Output wiring (U, V, W) has broken wire or poor contact", "Internal motor winding broken", "Contactor or terminal block contact poor", "Single-phase output connected"], "sols": ["Check three-phase output wiring U, V, W to motor with resistance meter", "After disconnecting, verify three-phase motor winding resistance is balanced", "Check intermediate contactors and terminal block contacts", "Connect output as three-phase"], "noteText": "Set [bb-66] to 01 to enable this protection function.", "note": "info"}, "ja": {"n": "出力欠相エラー", "sl": "警告", "d": "インバータ出力からモーターへの三相配線に欠相を検出しました。5Hz～100Hzの範囲でのみ検出。", "causes": ["出力配線（U、V、W）の断線または接触不良", "モーター巻線の内部断線", "電磁接触器または端子台の接点不良", "単相出力での接続"], "sols": ["インバータ出力端 function buildCard(code, info){
  // Use multilingual content if available
  let d = info;
  let sev = info.s;
  if(lang !== 'zh' && DB_LANG[code] && DB_LANG[code][lang]){
    d = DB_LANG[code][lang];
    d.s = info.s; // keep severity from original
  }
  const causeLabel = lang==='en'?'Possible Causes':lang==='ja'?'推定原因':'推測原因';
  const solLabel   = lang==='en'?'Troubleshooting Steps':lang==='ja'?'対処手順':'排查步驟';
  const sevLabel   = d.sl || info.sl;
  const name       = d.n  || info.n;
  const desc       = d.d  || info.d;
  const causes=(d.causes||info.causes).map(c=>`<li class="ci"><span>▸</span>${c}</li>`).join('');
  const sols=(d.sols||info.sols).map(s=>`<li class="si">${s}</li>`).join('');
  const noteText = d.noteText || info.noteText || '';
  const noteType = d.note || info.note || 'info';
  const noteHtml = noteText ? `<div class="note note-${noteType}">${noteText}</div>` : '';
  return `<div class="ecard ${info.s}">
    <div class="ehead"><span class="ebadge">${code}</span><span class="ename">${name}</span><span class="stag stag-${info.s}">${sevLabel}</span></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.6">${desc}</p>
    <div class="sec">${causeLabel}</div><ul class="causes">${causes}</ul>
    <div class="sec" style="margin-top:10px">${solLabel}</div><ul class="sols">${sols}</ul>
    ${noteHtml}
  </div>`;
}

// ── DB lookup ─────────────────────────────────────────────────────────────────
function dbLookup(text){
  const t=text.toUpperCase().replace(/\s/g,'');
  // exact
  const exactMatch=t.match(/E(\d+)/g);
  if(exactMatch){
    for(const m of exactMatch){
      const num=parseInt(m.slice(1));
      const k='E'+String(num).padStart(3,'0');
      if(DB[k]) return {type:'exact',code:k,info:DB[k]};
      // ranges
      for(const rk of Object.keys(DB)){
        if(rk.includes('-')){
          const [lo,hi]=rk.split('-').map(x=>parseInt(x.slice(1)));
          if(num>=lo&&num<=hi) return {type:'exact',code:rk,info:DB[rk]};
        }
      }
    }
  }
  return null;
}

function mdToHtml(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<strong style="font-size:13px;display:block;margin:8px 0 4px">$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="font-size:14px;display:block;margin:10px 0 5px">$1</strong>')
    .replace(/^- (.+)$/gm,'• $1')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

  setSend(false);

  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  const db=dbLookup(q);
  if(db){const si=document.getElementById('sb-'+db.code);if(si)si.classList.add('active');}

  if(mode==='db'){
    if(db){
      const lbl={zh:'以下是故障資訊：',en:'Fault information:',ja:'故障情報：'};
      addMsg('ai',`<strong>${db.code}</strong> ${lbl[lang]||lbl.zh}${buildCard(db.code,db.info)}`);
    } else {
      const msg={zh:'找不到對應的錯誤代碼。請直接輸入代碼（如 E001）或切換到 🧠 智能分析模式描述症狀。',en:'Error code not found. Enter a code directly (e.g. E001) or switch to 🧠 Smart Analysis mode.',ja:'エラーコードが見つかりません。コードを直接入力（例：E001）するか、🧠 スマート分析モードで症状を説明してください。'};
      addMsg('ai', msg[lang]||msg.zh);
    }
    setSend(true);
  } else {
    showTyping();
    setTimeout(()=>{
      rmTyping();
      addMsg('ai', smartReply(q));
      setSend(true);
    }, 500);
  }
}

function smartAnalyze(q){
  const t=q.toLowerCase();
  const rules=SYMPTOM_RULES[lang]||SYMPTOM_RULES.zh;
  for(const rule of rules){if(rule.keys.some(k=>t.includes(k)))return rule;}
  return null;
}

function smartReply(q){
  const db=dbLookup(q);
  const rule=smartAnalyze(q);
  if(db){
    const others=rule&&rule.codes?rule.codes.filter(c=>c!==db.code).slice(0,2):[];
    const relLabel={zh:'相關代碼：',en:'Related codes: ',ja:'関連コード：'};
    const otherHtml=others.length>0?`<div style="margin-top:10px;font-size:12px;color:var(--muted)">${relLabel[lang]||relLabel.zh}${others.map(c=>`<span class="pm" style="cursor:pointer" onclick="ask('${c}')">${c}</span>`).join(' ')}</div>`:'';
    return `<strong>${db.code}</strong>：${buildCard(db.code,db.info)}${otherHtml}`;
  }
  if(rule){
    if(rule.special)return buildSpecialReply(rule.special);
    const cards=rule.codes.slice(0,2).map(code=>{const e=DB[code];return e?`<div style="margin-top:8px">${buildCard(code,e)}</div>`:'' ;}).join('');
    const smartLabel={zh:'智能分析結果',en:'Smart Analysis Result',ja:'スマート分析結果'};
    return `<strong>${smartLabel[lang]||smartLabel.zh}</strong><br><br><div class="note note-info" style="margin-bottom:10px">${rule.tip}</div>${cards}`;
  }
  const nf={zh:`您描述的是「<strong>${q}</strong>」。<br><br>請提供更多資訊：<br><ul class="causes" style="margin-top:8px"><li class="ci"><span>❓</span>面板是否有 <strong>E 開頭的錯誤代碼</strong>？</li><li class="ci"><span>❓</span>問題發生在<strong>啟動時、運轉中、還是減速時</strong>？</li><li class="ci"><span>❓</span>是否有<strong>異常聲音、異味或過熱</strong>？</li></ul>`,en:`You described: "<strong>${q}</strong>".<br><br>Please provide more details:<br><ul class="causes" style="margin-top:8px"><li class="ci"><span>❓</span>Is there an <strong>E-code</strong> on the panel?</li><li class="ci"><span>❓</span>Does it occur on <strong>start, during run, or deceleration</strong>?</li><li class="ci"><span>❓</span>Any <strong>abnormal noise, odor, or overheating</strong>?</li></ul>`,ja:`「<strong>${q}</strong>」について確認します。<br><br>詳細を教えてください：<br><ul class="causes" style="margin-top:8px"><li class="ci"><span>❓</span>パネルに<strong>Eで始まるエラーコード</strong>は表示されていますか？</li><li class="ci"><span>❓</span>問題は<strong>起動時・運転中・減速時</strong>のいずれに発生しますか？</li><li class="ci"><span>❓</span><strong>異音・異臭・過熱</strong>はありますか？</li></ul>`};
  return nf[lang]||nf.zh;
}
