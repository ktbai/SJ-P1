<!-- SJ-P1 v6.0 功能導航 2026-04-20 -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日立 SJ-P1 AI 故障診斷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surf:#161921;--surf2:#1e2230;--surf3:#252a3a;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);--txt:#dde2ee;--muted:#7a849a;--accent:#5b9cf6;--accent-dim:rgba(91,156,246,0.1);--danger:#f47a7a;--danger-dim:rgba(244,122,122,0.1);--warn:#f5a742;--warn-dim:rgba(245,167,66,0.1);--ok:#52c77a;--ok-dim:rgba(82,199,122,0.1);--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;font-size:14px}
/* Header */
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.hdr-logo{width:30px;height:30px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr-info{flex:1}.hdr-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ok);background:var(--ok-dim);border:1px solid rgba(82,199,122,0.2);padding:3px 10px;border-radius:20px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Layout */
.layout{display:flex;flex:1;min-height:0;overflow:hidden}
/* Sidebar */
.sb{width:260px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 8px;border-bottom:1px solid var(--bdr)}
.sb-search{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--muted)}
.sb-list{overflow-y:auto;flex:1;padding:8px 8px}
.sb-section{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 6px 4px}
.sb-item{padding:7px 10px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s;border:1px solid transparent;margin-bottom:2px}
.sb-item:hover{background:var(--surf2);border-color:var(--bdr)}
.sb-item.active{background:var(--accent-dim);border-color:rgba(91,156,246,0.3)}
.sb-code{font-family:var(--mono);font-size:12px;color:var(--accent);min-width:38px;font-weight:500}
.sb-name{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sev{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sev-h{background:var(--danger)}.sev-m{background:var(--warn)}.sev-l{background:var(--ok)}.sev-i{background:var(--muted)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
/* Messages */
.msg{display:flex;gap:10px;max-width:820px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.ai .av{background:linear-gradient(135deg,#3b82f6,#6366f1)}
.msg.user .av{background:var(--surf3);border:1px solid var(--bdr2)}
.bubble{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:12px 15px;font-size:13px;line-height:1.75;flex:1;min-width:0}
.msg.user .bubble{background:var(--accent-dim);border-color:rgba(91,156,246,0.25)}
/* Welcome */
.welcome{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:22px;max-width:600px}
.wt{font-size:16px;font-weight:500;margin-bottom:8px}
.wd{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 10px;border:1px solid var(--bdr2);border-radius:16px;cursor:pointer;transition:all .15s;color:var(--muted);background:transparent;font-family:var(--sans)}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* Error card */
.ecard{border-radius:10px;padding:14px;border:1px solid;margin-top:6px}
.ecard.h{border-color:rgba(244,122,122,.25);background:var(--danger-dim)}
.ecard.m{border-color:rgba(245,167,66,.25);background:var(--warn-dim)}
.ecard.l{border-color:rgba(82,199,122,.25);background:var(--ok-dim)}
.ecard.i{border-color:var(--bdr2);background:var(--surf2)}
.ehead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ebadge{font-family:var(--mono);font-size:13px;font-weight:500;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,0.07)}
.ename{font-size:14px;font-weight:500}
.stag{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.stag-h{background:rgba(244,122,122,.18);color:var(--danger)}
.stag-m{background:rgba(245,167,66,.18);color:var(--warn)}
.stag-l{background:rgba(82,199,122,.18);color:var(--ok)}
.stag-i{background:var(--surf3);color:var(--muted)}
.sec{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 5px}
.causes{list-style:none;display:flex;flex-direction:column;gap:3px}
.ci{font-size:13px;padding:5px 9px;background:rgba(255,255,255,0.04);border-radius:6px;display:flex;gap:7px}
.sols{list-style:none;display:flex;flex-direction:column;gap:5px}
.si{font-size:13px;padding:7px 11px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:2px solid;line-height:1.6}
.h .si{border-left-color:var(--danger)}.m .si{border-left-color:var(--warn)}.l .si{border-left-color:var(--ok)}.i .si{border-left-color:var(--muted)}
.pm{display:inline-block;font-family:var(--mono);font-size:11px;background:rgba(91,156,246,.15);color:var(--accent);padding:1px 5px;border-radius:4px;margin:0 1px}
.note{margin-top:10px;font-size:12px;padding:7px 11px;border-radius:7px;line-height:1.6}
.note-warn{background:rgba(244,122,122,.08);border-left:2px solid var(--danger)}
.note-info{background:rgba(91,156,246,.08);border-left:2px solid var(--accent)}
/* Markdown in AI response */
.bubble strong{font-weight:500;color:var(--txt)}
.bubble ul{margin:6px 0 6px 16px}
.bubble li{margin:3px 0}
.bubble code{font-family:var(--mono);font-size:12px;background:var(--surf3);padding:1px 5px;border-radius:4px;color:var(--accent)}
/* Typing */
.typing-wrap{display:flex;gap:10px;max-width:820px}
.typing{display:flex;gap:4px;align-items:center;padding:14px 15px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.1s infinite}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
/* Input */
.input-wrap{border-top:1px solid var(--bdr);padding:12px 16px;background:var(--surf)}
.quick-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.irow{display:flex;gap:8px;align-items:flex-end}
.ta-wrap{flex:1;position:relative}
textarea.inp{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:10px 14px;outline:none;resize:none;min-height:42px;max-height:110px;transition:border-color .15s;line-height:1.5}
textarea.inp:focus{border-color:var(--accent)}
textarea.inp::placeholder{color:var(--muted)}
.send{width:40px;height:40px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send:hover{background:#7ab4ff}.send:disabled{opacity:.4;cursor:not-allowed}
.send svg{width:16px;height:16px;fill:#0d0f14}
.mode-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.mode-label{font-size:11px;color:var(--muted)}
.mode-btn{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--bdr2);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--sans);transition:all .12s}
.mode-btn.on{background:var(--accent-dim);border-color:rgba(91,156,246,.35);color:var(--accent)}
/* Streaming text cursor */
.cursor{display:inline-block;width:2px;height:14px;background:var(--accent);margin-left:2px;animation:blink .8s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:700px){
  /* Hide desktop sidebar */
  .sb{display:none}
  /* Header - fix truncation */
  .hdr{height:auto;padding:8px 12px;flex-wrap:wrap;gap:6px}
  .hdr-info{min-width:0;flex:1}
  .hdr-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-sub{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-badge{font-size:10px;padding:2px 8px}
  /* Language bar - smaller buttons */
  .lang-bar{padding:5px 10px;gap:5px;flex-wrap:wrap}
  .lang-btn{font-size:11px;padding:4px 8px}
  /* Layout - full width on mobile */
  .layout{flex-direction:column;height:calc(100vh - 100px);overflow:hidden}
  .main{width:100%;min-width:0;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
  /* Chat area - must have flex:1 to fill space */
  .chat{flex:1;overflow-y:auto;padding:12px;min-height:0}
  /* Welcome card */
  .welcome{padding:16px}
  .wt{font-size:14px}
  .wd{font-size:12px}
  /* Result card */
  .result-card{padding:12px}
  .ecard{padding:12px}
  .ehead{gap:6px}
  .ename{font-size:13px}
  /* Input area */
  .input-wrap{padding:8px 10px}
  .mode-row{flex-wrap:wrap;gap:4px}
  .quick-chips{gap:4px}
  .chip{font-size:11px;padding:3px 8px}
  /* Mobile error list - show as horizontal scroll chips instead of sidebar */
  .mobile-sb{display:flex;overflow-x:auto;gap:6px;padding:8px 10px;background:var(--surf);border-bottom:1px solid var(--bdr);-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .mobile-sb::-webkit-scrollbar{display:none}
  .mobile-sb-item{flex-shrink:0;font-size:12px;padding:5px 10px;border-radius:16px;border:1px solid var(--bdr2);cursor:pointer;color:var(--muted);background:transparent;font-family:var(--sans);white-space:nowrap}
  .mobile-sb-item:active{background:var(--accent-dim);border-color:rgba(91,156,246,.4);color:var(--accent)}
  .mobile-sb-item.active{background:var(--accent-dim);border-color:rgba(91,156,246,.4);color:var(--accent)}
}
@media(min-width:701px){
  .mobile-sb{display:none}
}}

.lang-bar{background:var(--surf2);border-bottom:1px solid var(--bdr);padding:7px 16px;display:flex;align-items:center;gap:8px}
.lang-label{font-size:11px;color:var(--muted)}
.lang-btn{font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--sans);transition:all .15s}
.lang-btn.on{background:var(--accent-dim);border-color:rgba(91,156,246,.4);color:var(--accent);font-weight:500}

.result-card{padding:20px;animation:fadeIn .2s ease}

.tab-bar{background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;gap:0;padding:0 16px}
.tab-btn{font-size:13px;padding:11px 18px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:var(--sans);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.tab-btn:hover{color:var(--txt)}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-panel.on{display:flex}
.nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px;overflow-y:auto}
.nav-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.nav-card:hover{border-color:var(--accent);background:var(--accent-dim);transform:translateY(-2px)}
.nav-card:active{transform:translateY(0)}
.nav-icon{font-size:28px}
.nav-title{font-size:13px;font-weight:500;color:var(--txt)}
.nav-desc{font-size:11px;color:var(--muted);line-height:1.4}
.nav-section{padding:8px 20px 4px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);grid-column:1/-1}
.func-result{padding:20px;overflow-y:auto;flex:1}
.func-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:20px;max-width:700px}
.func-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.func-icon{font-size:32px}
.func-title{font-size:18px;font-weight:500}
.func-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.func-section{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.func-steps{list-style:none;display:flex;flex-direction:column;gap:6px}
.func-step{display:flex;gap:10px;font-size:13px;padding:8px 12px;background:var(--surf2);border-radius:8px;line-height:1.6;border-left:2px solid var(--accent)}
.func-step-num{color:var(--accent);font-weight:500;font-family:var(--mono);flex-shrink:0}
.func-params{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.func-param{font-family:var(--mono);font-size:12px;background:rgba(91,156,246,.15);color:var(--accent);padding:3px 8px;border-radius:5px}
.func-note{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:7px;line-height:1.6;background:rgba(91,156,246,.08);border-left:2px solid var(--accent)}
.func-warn{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:7px;line-height:1.6;background:rgba(244,122,122,.08);border-left:2px solid var(--danger)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:6px 12px;border-radius:6px;border:1px solid var(--bdr);background:transparent;font-family:var(--sans);margin-bottom:14px;transition:all .15s}
.back-btn:hover{color:var(--txt);border-color:var(--bdr2)}
@media(max-width:700px){
  .nav-grid{grid-template-columns:repeat(2,1fr);padding:12px;gap:8px}
  .nav-card{padding:12px}
  .nav-icon{font-size:22px}
  .nav-title{font-size:12px}
  .nav-desc{font-size:10px}
  .tab-btn{font-size:12px;padding:9px 12px}
  .func-result{padding:12px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">⚡</div>
  <div class="hdr-info">
    <div class="hdr-title" id="hdrTitle">SJ-P1 智能故障診斷助理</div>
    <div class="hdr-sub" id="hdrSub">日立變頻器 · 全錯誤代碼 · 內建智能分析</div>
  </div>
  <div class="hdr-badge"><span class="hdr-dot"></span><span id="hdrBadge">AI 已就緒</span></div>
</div>

<div class="lang-bar">
  <span class="lang-label" id="langLabel">語言：</span>
  <button class="lang-btn on" id="btnZH" onclick="document.getElementById('resultArea').innerHTML='';setLang('zh')">🇹🇼 繁體中文</button>
  <button class="lang-btn" id="btnEN" onclick="document.getElementById('resultArea').innerHTML='';setLang('en')">🇺🇸 English</button>
  <button class="lang-btn" id="btnJA" onclick="document.getElementById('resultArea').innerHTML='';setLang('ja')">🇯🇵 日本語</button>
</div>
<div class="tab-bar">
  <button class="tab-btn on" id="tabNav" onclick="switchTab('nav')">⚡ 功能導航</button>
  <button class="tab-btn" id="tabDiag" onclick="switchTab('diag')">🔧 故障診斷</button>
</div>
<div class="mobile-sb" id="mobileSb"></div>

<!-- Nav Panel -->
<div class="tab-panel" id="panelNav">
  <div id="navGrid" class="nav-grid"></div>
  <div id="funcResult" class="func-result" style="display:none"></div>
</div>

<!-- Diag Panel -->
<div class="tab-panel on" id="panelDiag">
<div class="layout">
<div class="sb">
  <div class="sb-head">
    <input class="sb-search" type="text" placeholder="搜尋錯誤代碼或名稱…" id="sbSearch" oninput="filterSidebar(this.value)">
  </div>
  <div class="sb-list" id="sbList"></div>
</div>

<div class="main">
  <div class="chat" id="chat">
    <div id="welcomeArea"></div>
    <div id="resultArea"></div>
  </div>
  <div class="input-wrap">
    <div class="mode-row">
      <span class="mode-label" id="modeLabel">回答模式：</span>
      <button class="mode-btn on" id="modeAI" onclick="setMode('ai')">🤖 AI 智能回答</button>
      <button class="mode-btn" id="modeDB" onclick="setMode('db')">📋 快速查詢</button>
    </div>
    <div class="quick-chips">
      <button class="chip" onclick="ask('E001')">E001</button>
      <button class="chip" onclick="ask('E005')">E005</button>
      <button class="chip" onclick="ask('E007')">E007</button>
      <button class="chip" onclick="ask('E009')">E009</button>
      <button class="chip" onclick="ask('E012')">E012</button>
      <button class="chip" onclick="ask('E014')">E014</button>
      <button class="chip" onclick="ask('E020')">E020</button>
      <button class="chip" onclick="ask('E039')">E039</button>
    </div>
    <div class="irow">
      <div class="ta-wrap">
        <textarea class="inp" id="inp" placeholder="輸入錯誤代碼或描述症狀…" rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      </div>
      <button class="send" id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>
</div>
</div><!-- /panelDiag -->

<script>
// ── Error DB (full list from Chapter 18) ──────────────────────────────────────
const DB = {
  E001:{n:'過電流錯誤',s:'h',sl:'嚴重',d:'逆變器輸出電流超過額定值，保護電路切斷輸出。最常見錯誤之一。',causes:['加速時間過短，啟動電流過大','馬達或負載發生機械卡死、堵轉','逆變器容量不足，超過額定電流','減速時負載慣性過大，產生再生電流','輸出側短路或接地故障'],sols:['延長加速時間 <span class="pm">[FA-01]</span>（加速時間1），建議先嘗試增加 50%','確認馬達與負載是否有機械卡死，手動轉動確認是否可自由旋轉','確認逆變器規格與馬達額定電流是否匹配','延長減速時間 <span class="pm">[FA-12]</span>，或加裝制動電阻器','使用過電流抑制功能 <span class="pm">[bA120]</span> 自動限制加速電流'],rst:true,note:'info',noteText:'重置：確認運轉指令 OFF 後，按面板 STOP/RESET 鍵，或將 RS 端子 ON→OFF。'},

// ── Sidebar setup ────────────────────────────────────────────────────────────
const items = Object.entries(DB).map(([k,v])=>({code:k,name:v.n,sev:v.s}));
function renderSidebar(filter=''){
  const el=document.getElementById('sbList');
  if(!el)return;
  const f=(filter||'').toLowerCase();
  const allItems=Object.entries(DB);
  const filtered=allItems.filter(([k,v])=>{
    const n=lang!=='zh'&&NAMES[k]?NAMES[k][lang]||v.n:v.n;
    return !f||(k.toLowerCase().includes(f)||n.toLowerCase().includes(f));
  });
  el.innerHTML=filtered.map(([k,v])=>{
    const n=lang!=='zh'&&NAMES[k]?NAMES[k][lang]||v.n:v.n;
    return `<div class="sb-item" id="sb-${k}" onclick="ask('${k}')">
      <span class="sb-code">${k}</span>
      <span class="sb-name">${n}</span>
      <span class="sev sev-${v.s}"></span>
    </div>`;
  }).join('');
}
function filterSidebar(v){renderSidebar(v)}

function renderMobileSidebar(){
  const msb=document.getElementById('mobileSb');
  if(!msb)return;
  msb.innerHTML=Object.entries(DB).map(([k,v])=>{
    const n=lang!=='zh'&&NAMES[k]?NAMES[k][lang]||v.n:v.n;
    return `<button class="mobile-sb-item" id="msb-${k}" onclick="ask('${k}')">${k}</button>`;
  }).join('');
}

// ── Mode ─────────────────────────────────────────────────────────────────────
let mode = 'ai';
function setMode(m){
  mode=m;
  document.getElementById('modeAI').className='mode-btn'+(m==='ai'?' on':'');
  document.getElementById('modeDB').className='mode-btn'+(m==='db'?' on':'');
}

// ── Chat helpers ──────────────────────────────────────────────────────────────
let busy = false;
function addMsg(type, html){
  const d = document.createElement('div');
  d.className='msg '+type;
  d.innerHTML=`<div class="av">${type==='ai'?'⚡':'👤'}</div><div class="bubble">${html}</div>`;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({block:'end',behavior:'smooth'});
  return d.querySelector('.bubble');
}

function setSend(on){document.getElementById('sendBtn').disabled=!on;busy=!on;}

ture. Have an operator confirm safety before manually restarting.", "note": "info"}, "ja": {"n": "USPエラー（不意起動防止）", "sl": "情報", "d": "電源投入時に運転指令がON状態であることを検出し、不意起動防止のため保護が動作しました。", "causes": ["電源投入前に運転指令（FW/RV端子）がすでにON状態", "停電後に制御システムが自動的に運転指令を出力"], "sols": ["電源投入前に運転指令端子がOFFであることを確認", "リセット後、運転指令がOFFであることを確認してから再度指令を与える"], "noteText": "これは安全保護機能です。オペレーターが安全を確認してから手動で起動してください。", "note": "info"}}, "E014": {"en": {"n": "Ground Fault Error", "sl": "Critical", "d": "Ground fault detected between inverter output and motor at power-on; output tripped to protect inverter.", "causes": ["Motor insulation degraded; phase-to-ground short circuit", "Aged wiring with damaged insulation contacting ground", "Moisture reducing insulation resistance"], "sols": ["Power off, disconnect motor wiring, measure insulation resistance to ground with megohmmeter (must be >1MΩ)", "After identifying fault location, replace aged wiring or send motor for repair", "Improve installation environment — prevent moisture or corrosive gases"], "noteText": "⚠️ Do NOT reset and re-energize without identifying and resolving the fault — risk of greater damage or safety incident.", "note": "warn"}, "ja": {"n": "地絡エラー", "sl": "重大", "d": "電源投入時にインバータ出力とモーター間の地絡を検出し、インバータ保護のため出力を遮断しました。", "causes": ["モーター絶縁劣化による相間地絡", "配線老化・絶縁破損による接地接触", "湿気による絶縁抵抗低下"], "sols": ["電源を遮断後、モーター配線を外し、絶縁抵抗計で対地絶縁抵抗を測定（1MΩ以上必要）", "地絡箇所特定後、劣化配線交換またはモーター修理", "設置環境改善（湿気・腐食性ガスを防止）"], "noteText": "⚠️ 原因を特定・解決する前にリセット・投入しないでください。大きな損傷や安全事故につながる危険があります。", "note": "warn"}}, "E020": {"en": {"n": "Cooling Fan Speed Error", "sl": "Warning", "d": "Cooling fan speed dropped; cooling performance reduced; inverter overtemperature protective trip.", "causes": ["Heat sink fins or air intake blocked by dust", "Cooling fan bearing worn; reduced rotation speed", "Fan power circuit abnormality or fan failure", "Ambient temperature too high (above 50°C specification limit)"], "sols": ["Power off and clean dust from heat sink fins and air intake (use compressed air)", "Ensure adequate ventilation clearance around inverter", "If fan speed is abnormal, replace cooling fan (consumable part)", "Verify ambient temperature is within specification"], "noteText": "Cooling fan is a consumable part — recommended replacement every 2~3 years.", "note": "info"}, "ja": {"n": "冷却ファン回転数低下エラー", "sl": "警告", "d": "冷却ファンの回転数が低下し、冷却性能が不足したためインバータ温度が上昇し、保護トリップしました。", "causes": ["ヒートシンクフィンや吸気口のホコリ詰まり", "冷却ファンの軸受磨耗による回転数低下", "ファン電源回路の異常またはファン故障", "設置環境温度が高すぎる（上限50°C超）"], "sols": ["電源遮断後、ヒートシンクと吸気口のホコリを清掃（エアブロー）", "インバータ周囲の通風スペースを確保", "ファン回転数が異常な場合は冷却ファンを交換（消耗品）", "周囲温度が仕様範囲内か確認"], "noteText": "冷却ファンは消耗品です。2～3年ごとの定期交換を推奨します。", "note": "info"}}, "E039": {"en": {"n": "Inverter Overload Error", "sl": "Critical", "d": "Inverter's own electronic thermal protection detected overload of the inverter itself (distinct from E005 motor overload).", "causes": ["Continuous operation exceeding inverter rated current", "High ambient temperature reducing inverter current rating (derating)", "Frequent acceleration/deceleration or heavy load operation"], "sols": ["Reduce load or select larger capacity inverter", "Check ambient temperature; improve cooling conditions", "Verify load duty rating <span class=\"pm\">[Ub-03]</span> (LD/ND/HD) is within rated current", "Reduce frequency of acceleration/deceleration operations"], "noteText": "Reset is not accepted for 10 seconds after this error. Please wait before resetting.", "note": "warn"}, "ja": {"n": "インバータ過負荷エラー", "sl": "重大", "d": "インバータ本体の電子サーマル保護がインバータ自身の過負荷を検出しました（E005モーター過負荷とは異なります）。", "causes": ["インバータ定格電流を超えた継続運転", "高周囲温度によるインバータ電流定格低下（ディレーティング）", "頻繁な加減速または重負荷運転"], "sols": ["負荷を低減するか、より大容量のインバータを選択", "周囲温度を確認し、冷却を改善", "負荷仕様 <span class=\"pm\">[Ub-03]</span>（LD/ND/HD）が定格電流範囲内か確認", "加減速頻度を低減"], "noteText": "このエラー後10秒間はリセット不可。しばらく待ってからリセットしてください。", "note": "warn"}}, "E015": {"en": {"n": "Supply Overvoltage Error", "sl": "Warning", "d": "Supply voltage remained too high for over 100 seconds while inverter output was stopped.", "causes": ["Supply voltage itself is too high", "Unstable power supply environment"], "sols": ["Verify supply voltage is within specification", "Inspect power supply environment; install AC reactor if necessary", "Check parameter <span class=\"pm\">[bb-61]</span> overvoltage selection and <span class=\"pm\">[bb-62]</span> level setting"], "noteText": "", "note": "info"}, "ja": {"n": "受電過電圧エラー", "sl": "警告", "d": "インバータ出力停止中に受電電圧が100秒以上高すぎる状態が継続しました。", "causes": ["電源電圧自体が高い", "電源環境が不安定"], "sols": ["電源電圧が仕様範囲内か確認", "電源環境を点検し、必要に応じてACリアクトルを設置", "パラメータ <span class=\"pm\">[bb-61]</span> 過電圧選択と <span class=\"pm\">[bb-62]</span> レベル設定を確認"], "noteText": "", "note": "info"}}, "E016": {"en": {"n": "Momentary Power Loss Error", "sl": "Warning", "d": "Momentary power failure detected; inverter tripped output.", "causes": ["Momentary power interruption (grid disturbance, switching)", "Main supply R/S/T voltage drop"], "sols": ["Check power supply quality; consider installing UPS", "Enable momentary power loss ride-through <span class=\"pm\">[bA-30]</span>", "If supply is unstable, consider voltage stabilizer or AC reactor"], "noteText": "", "note": "info"}, "ja": {"n": "瞬時停電エラー", "sl": "警告", "d": "瞬時停電が発生したため、出力を遮断しました。", "causes": ["瞬時電源中断（電網擾乱、スイッチング）", "主電源R/S/T電圧低下"], "sols": ["電源品質を確認し、UPS設置を検討", "瞬停再起動機能 <span class=\"pm\">[bA-30]</span> を有効化", "電源が不安定な場合は安定化電源またはACリアクトルを検討"], "noteText": "", "note": "info"}}, "E019": {"en": {"n": "Temperature Detector Error", "sl": "Critical", "d": "Internal temperature sensing element abnormality detected.", "causes": ["Temperature sensing circuit failure", "Strong electromagnetic interference"], "sols": ["Verify ambient temperature is within specification", "If error persists after reset, temperature sensor may be damaged — contact service"], "noteText": "This is a hardware fault. Contact service personnel.", "note": "warn"}, "ja": {"n": "温度検出器エラー", "sl": "重大", "d": "内蔵温度検出素子に異常が発生しました。", "causes": ["温度検出回路の故障", "強い電磁ノイズ"], "sols": ["周囲温度が仕様範囲内か確認", "リセット後も発生する場合は温度センサー故障の可能性があるため修理が必要"], "noteText": "ハードウェア故障です。サービス担当者に連絡してください。", "note": "warn"}}, "E021": {"en": {"n": "Overheat Error", "sl": "Critical", "d": "Inverter internal temperature exceeded protection threshold; output tripped. Also refer to E020.", "causes": ["Severely clogged heat sink fins", "Ambient temperature too high", "Cooling fan completely stopped", "Continuous inverter overload"], "sols": ["Immediately clean heat sink fins (after powering off)", "Verify and improve ambient temperature conditions", "Check cooling fan operation; replace if necessary", "Reduce load or select larger capacity inverter"], "noteText": "Reset only after temperature has cooled. Confirm cooling improvement before resuming operation.", "note": "warn"}, "ja": {"n": "温度エラー（過熱保護）", "sl": "重大", "d": "インバータ内部温度が保護動作温度を超えたため、出力を遮断しました。E020も参照してください。", "causes": ["ヒートシンクの著しいホコリ詰まり", "設置環境温度が高すぎる", "冷却ファンが完全に停止", "インバータの継続的な過負荷運転"], "sols": ["直ちにヒートシンクを清掃（電源遮断後）", "設置環境の温度条件を確認・改善", "冷却ファンの動作を確認し、必要であれば交換", "負荷を低減するか、より大容量のインバータを選択"], "noteText": "温度が冷却されてからリセットしてください。運転再開前に冷却改善を確認してください。", "note": "warn"}}, "E024": {"en": {"n": "Input Phase Loss Error", "sl": "Warning", "d": "Phase loss detected in three-phase input supply; protection activated.", "causes": ["One phase of supply wiring has poor contact or broken wire", "Supply-side fuse blown", "Phase loss from utility supply", "Single-phase input connected"], "sols": ["Measure input voltages R, S, T with voltmeter; verify all phases normal", "Check input terminal wiring tightness", "Verify supply-side fuses and circuit breakers", "Ensure input is connected as three-phase"], "noteText": "Set [bb-65] to 01 to enable this phase loss detection function.", "note": "info"}, "ja": {"n": "入力欠相エラー", "sl": "警告", "d": "三相電源入力の欠相を検出し、電源不平衡保護が動作しました。", "causes": ["電源配線の一相の接触不良または断線", "電源側ヒューズ断線", "電力会社の供給側欠相", "単相入力での使用"], "sols": ["電圧計で入力端R・S・T三相電圧を測定し、各相電圧が正常か確認", "主回路入力端子の配線締め付けを確認", "電源側配電盤のヒューズ・ブレーカー function buildCard(code, info){
  // Use multilingual content if available
  let d = info;
  let sev = info.s;
  if(lang !== 'zh' && DB_LANG[code] && DB_LANG[code][lang]){
    d = DB_LANG[code][lang];
    d.s = info.s; // keep severity from original
  }
  const causeLabel = lang==='en'?'Possible Causes':lang==='ja'?'推定原因':'推測原因';
  const solLabel   = lang==='en'?'Troubleshooting Steps':lang==='ja'?'対処手順':'排查步驟';
  const sevLabel   = d.sl || info.sl;
  const name       = d.n  || info.n;
  const desc       = d.d  || info.d;
  const causes=(d.causes||info.causes).map(c=>`<li class="ci"><span>▸</span>${c}</li>`).join('');
  const sols=(d.sols||info.sols).map(s=>`<li class="si">${s}</li>`).join('');
  const noteText = d.noteText || info.noteText || '';
  const noteType = d.note || info.note || 'info';
  const noteHtml = noteText ? `<div class="note note-${noteType}">${noteText}</div>` : '';
  return `<div class="ecard ${info.s}">
    <div class="ehead"><span class="ebadge">${code}</span><span class="ename">${name}</span><span class="stag stag-${info.s}">${sevLabel}</span></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.6">${desc}</p>
    <div class="sec">${causeLabel}</div><ul class="causes">${causes}</ul>
    <div class="sec" style="margin-top:10px">${solLabel}</div><ul class="sols">${sols}</ul>
    ${noteHtml}
  </div>`;
}

// ── DB lookup ─────────────────────────────────────────────────────────────────
function dbLookup(text){
  const t=text.toUpperCase().replace(/\s/g,'');
  // exact
  const exactMatch=t.match(/E(\d+)/g);
  if(exactMatch){
    for(const m of exactMatch){
      const num=parseInt(m.slice(1));
      const k='E'+String(num).padStart(3,'0');
      if(DB[k]) return {type:'exact',code:k,info:DB[k]};
      // ranges
      for(const rk of Object.keys(DB)){
        if(rk.includes('-')){
          const [lo,hi]=rk.split('-').map(x=>parseInt(x.slice(1)));
          if(num>=lo&&num<=hi) return {type:'exact',code:rk,info:DB[rk]};
        }
      }
    }
  }
  return null;
}

let history = [];

function mdToHtml(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<strong style="font-size:13px;display:block;margin:8px 0 4px">$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="font-size:14px;display:block;margin:10px 0 5px">$1</strong>')
    .replace(/^- (.+)$/gm,'• $1')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

// ── Main send ─────────────────────────────────────────────────────────────────
function ask(q){
  document.getElementById('inp').value=q;
  send();
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}

async function clearChat(){
  // Replace result area content - zero accumulation possible
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('welcomeArea').style.display='none';
}

function send(){
  if(busy)return;
  const inp=document.getElementById('inp');
  const q=inp.value.trim();
  if(!q)return;
  inp.value='';inp.style.height='auto';
  setSend(false);
  // Clear everything - only show current result
  clearChat();
  document.querySelectorAll('.sb-item,.mobile-sb-item').forEach(e=>e.classList.remove('active'));
  const db=dbLookup(q);
  if(db){const si=document.getElementById('sb-'+db.code);if(si)si.classList.add('active');const msi=document.getElementById('msb-'+db.code);if(msi)msi.classList.add('active');}

  if(mode==='db'){
    if(db){
      showResult(buildCard(db.code,db.info));
    } else {
      const msg={zh:'找不到對應的錯誤代碼。請直接輸入代碼（如 E001）或切換到 🧠 智能分析模式描述症狀。',en:'Error code not found. Enter a code directly (e.g. E001) or switch to 🧠 Smart Analysis mode.',ja:'エラーコードが見つかりません。コードを直接入力（例：E001）するか、🧠 スマート分析モードで症状を説明してください。'};
      showResult(msg[lang]||msg.zh);
    }
    setSend(true);
  } else {
    showTypingIndicator();
    setTimeout(()=>{
      hideTypingIndicator();
      showResult(smartReply(q));
      setSend(true);
    }, 500);
  }
}

function showResult(html){
  // Directly set innerHTML - guaranteed single result, no accumulation
  const ra=document.getElementById('resultArea');
  ra.innerHTML='<div class="result-card">'+html+'</div>';
  const chat=document.getElementById('chat');
  chat.scrollTop=0;
}

function smartAnalyze(q){
  const t=q.toLowerCase();
  const rules=SYMPTOM_RULES[lang]||SYMPTOM_RULES.zh;
  for(const rule of rules){if(rule.keys.some(k=>t.includes(k)))return rule;}
  return null;
}

function smartReply(q){
  const db=dbLookup(q);
  const rule=smartAnalyze(q);
  if(db){
    const others=rule&&rule.codes?rule.codes.filter(c=>c!==db.code).slice(0,2):[];
    const relLabel={zh:'相關代碼：',en:'Related codes: ',ja:'関連コード：'};
    const otherHtml=others.length>0?`<div style="margin-top:10px;font-size:12px;color:var(--muted)">${relLabel[lang]||relLabel.zh}${others.map(c=>`<span class="pm" style="cursor:pointer" onclick="ask('${c}')">${c}</span>`).join(' ')}</div>`:'';
    return `<strong>${db.code}</strong>：${buildCard(db.code,db.info)}${otherHtml}`;
  }
  if(rule){
    if(rule.special)return buildSpecialReply(rule.special);
    const cards=rule.codes.slice(0,2).map(code=>{const e=DB[code];return e?`<div style="margin-top:8px">${buildCard(code,e)}</div>`:'' ;}).join('');
    const smartLabel={zh:'智能分析結果',en:'Smart Analysis Result',ja:'スマート分析結果'};
    return `<strong>${smartLabel[lang]||smartLabel.zh}</strong><br><br><div class="note note-info" style="margin-bottom:10px">${rule.tip}</div>${cards}`;
  }
  const nf={zh:`您描述的是「<strong>${q}</strong>」。<br><br>請提供更多資訊：<br><ul class="causes" style="margin-top:8px"><li class="ci"><span>❓</span>面板是否有 <strong>E 開頭的錯誤代碼</strong>？</li><li class="ci"><span>❓</span>問題發生在<strong>啟動時、運轉中、還是減速時</strong>？</li><li class="ci"><span>❓</span>是否有<strong>異常聲音、異味或過熱</strong>？</li></ul>`,en:`You described: "<strong>${q}</strong>".<br><br>Please provide more details:<br><ul class="causes" style="margin-top:8px"><li class="ci"><span>❓</span>Is there an <strong>E-code</strong> on the panel?</li><li class="ci"><span>❓</span>Does it occur on <strong>start, during run, or deceleration</strong>?</li><li class="ci"><span>❓</span>Any <strong>abnormal noise, odor, or overheating</strong>?</li></ul>`,ja:`「<strong>${q}</strong>」について確認します。<br><br>詳細を教えてください：<br><ul class="causes" style="margin-top:8px"><li class="ci"><span>❓</span>パネルに<strong>Eで始まるエラーコード</strong>は表示されていますか？</li><li class="ci"><span>❓</span>問題は<strong>起動時・運転中・減速時</strong>のいずれに発生しますか？</li><li class="ci"><span>❓</span><strong>異音・異臭・過熱</strong>はありますか？</li></ul>`};
  return nf[lang]||nf.zh;
}

function rebuildWelcome(t){
  const wa=document.getElementById('welcomeArea');
  wa.style.display='';
  wa.innerHTML=`<div class="welcome">
    <div class="wt" id="welcomeTitle">${t.welcomeTitle}</div>
    <div class="wd" id="welcomeDesc">${t.welcomeDesc}</div>
    <div class="chips" id="quickChips">${t.chips.map(([q,label])=>`<button class="chip" onclick="ask('${q}')">${label}</button>`).join('')}</div>
  </div>`;

function setLang(l){
  lang=l;
  ['btnZH','btnEN','btnJA'].forEach(id=>{const b=document.getElementById(id);if(b)b.className='lang-btn';});
  const btn=document.getElementById(l==='zh'?'btnZH':l==='en'?'btnEN':'btnJA');
  if(btn)btn.className='lang-btn on';
  const t=I18N[l];
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const setH=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v;};
  set('hdrTitle',t.hdrTitle);set('hdrSub',t.hdrSub);set('hdrBadge',t.hdrBadge);
  set('langLabel',t.langLabel);
  const sb=document.getElementById('sbSearch');if(sb)sb.placeholder=t.searchPH;
  set('modeLabel',t.modeLabel);
  const ai=document.getElementById('modeAI');if(ai)ai.textContent=t.modeAI;
  const db2=document.getElementById('modeDB');if(db2)db2.textContent=t.modeDB;
  const inp=document.getElementById('inp');if(inp)inp.placeholder=t.inputPH;
  // Clear result and show welcome in new language
  document.getElementById('resultArea').innerHTML='';
  document.querySelectorAll('.sb-item,.mobile-sb-item').forEach(e=>e.classList.remove('active'));
  rebuildWelcome(t);
  renderSidebar();
  renderMobileSidebar();
}

// ── Render nav grid ───────────────────────────────────────────────────────────
function renderNavGrid(){
  const ng=document.getElementById('navGrid');
  const fr=document.getElementById('funcResult');
  if(!ng)return;
  ng.style.display='grid';
  fr.style.display='none';
  const data=NAV_DATA[lang]||NAV_DATA.zh;
  ng.innerHTML=data.sections.map(sec=>{
    const items=sec.items.map(item=>`
      <div class="nav-card" onclick="showFunc('${item.id}')">
        <div class="nav-icon">${item.icon}</div>
        <div class="nav-title">${item.title}</div>
        <div class="nav-desc">${item.desc}</div>
      </div>`).join('');
    return `<div class="nav-section">${sec.label}</div>${items}`;
  }).join('');
}

function showFunc(id){
  const ng=document.getElementById('navGrid');
  const fr=document.getElementById('funcResult');
  const detail=FUNC_DETAIL[id];
  if(!detail){return;}
  const d=detail[lang]||detail.zh;
  const backLabel={zh:'← 返回功能清單',en:'← Back to Functions',ja:'← 機能一覧に戻る'};
  const causeLabel={zh:'設定步驟',en:'Setup Steps',ja:'設定手順'};
  const paramLabel={zh:'相關參數',en:'Related Parameters',ja:'関連パラメータ'};
  const steps=d.steps.map((s,i)=>`<li class="func-step"><span class="func-step-num">${i+1}</span><span>${s}</span></li>`).join('');
  const params=d.params.map(p=>`<span class="func-param">${p}</span>`).join('');
  const note=d.note?`<div class="func-note">💡 ${d.note}</div>`:'';
  const warn=d.warn?`<div class="func-warn">⚠️ ${d.warn}</div>`:'';
  ng.style.display='none';
  fr.style.display='block';
  fr.innerHTML=`
    <button class="back-btn" onclick="renderNavGrid()">← ${backLabel[lang]||backLabel.zh}</button>
    <div class="func-card">
      <div class="func-header">
        <div class="func-title">${d.title}</div>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${d.subtitle}</div>
      <div class="func-section">${causeLabel[lang]||causeLabel.zh}</div>
      <ul class="func-steps">${steps}</ul>
      <div class="func-section" style="margin-top:16px">${paramLabel[lang]||paramLabel.zh}</div>
      <div class="func-params">${params}</div>
      ${note}${warn}
    </div>`;
}

// Update tab labels on lang change
const origSetLang = setLang;

// Run after DOM is ready
document.addEventListener('DOMContentLoaded',function(){
  setLang('zh');
  // Update tab labels
  function updateTabLabels(){
    const labels={zh:['⚡ 功能導航','🔧 故障診斷'],en:['⚡ Functions','🔧 Fault Diagnosis'],ja:['⚡ 機能ナビ','🔧 故障診断']};
    const l=labels[lang]||labels.zh;
    const tn=document.getElementById('tabNav');
    const td=document.getElementById('tabDiag');
    if(tn)tn.textContent=l[0];
    if(td)td.textContent=l[1];
  }
  const _sl=setLang;
  setLang=function(l){_sl(l);updateTabLabels();if(document.getElementById('panelNav').classList.contains('on'))renderNavGrid();};
  updateTabLabels();
});
</script>
